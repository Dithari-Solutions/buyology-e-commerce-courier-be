spring.application.name=buyology-courier

# ── Active profile ────────────────────────────────────────────────────────────
# Override with SPRING_PROFILES_ACTIVE=prod in production
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/buyology_courier}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
# Hibernate manages the schema — creates/updates tables automatically on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ── HikariCP connection pool ──────────────────────────────────────────────────
spring.datasource.hikari.pool-name=BuyologyCourierPool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.register-mbeans=true

# ── Flyway ────────────────────────────────────────────────────────────────────
# Disabled — no migration files exist; Hibernate handles schema creation
spring.flyway.enabled=false

# ── RabbitMQ ──────────────────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── Cache ─────────────────────────────────────────────────────────────────────
spring.cache.type=redis

# ── Pagination ────────────────────────────────────────────────────────────────
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=20

# ── Security / OAuth2 (Keycloak — admin tokens) ───────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8080/realms/buyology}

# ── Auth — admin JWT audience validation ──────────────────────────────────────
# The Keycloak decoder rejects any admin token whose `aud` claim does not contain
# this value. Configure a matching Audience mapper in Keycloak:
#   Client → buyology-courier-service → Client Scopes → add audience mapper → "buyology-courier-service"
auth.admin.jwt.audience=${AUTH_ADMIN_JWT_AUDIENCE:buyology-courier-service}

# ── Auth — refresh token cleanup ─────────────────────────────────────────────
# Runs nightly at 03:00 to purge expired tokens (table would grow unbounded otherwise)
auth.refresh-token.cleanup-cron=${AUTH_REFRESH_CLEANUP_CRON:0 0 3 * * *}

# ── Auth — self-issued courier JWTs ──────────────────────────────────────────
# IMPORTANT: replace the default secret before deploying.
# Must be at least 32 ASCII characters (256-bit key for HMAC-SHA256).
auth.jwt.secret=${AUTH_JWT_SECRET:buyology-courier-change-me-in-prod!!}
auth.jwt.issuer=${AUTH_JWT_ISSUER:buyology-courier-service}
# Access token TTL: 15 minutes
auth.jwt.access-token-expiry-seconds=${AUTH_JWT_ACCESS_EXPIRY:900}
# Refresh token TTL: 30 days
auth.jwt.refresh-token-expiry-seconds=${AUTH_JWT_REFRESH_EXPIRY:2592000}

# ── Ecommerce service-to-service JWT (RSA-256) ───────────────────────────────
# The ecommerce backend signs tokens with its RSA private key (kept secret there).
# The courier service only needs the public key — committed to the repo at:
#   src/main/resources/ecommerce-public.pem
# No shared secret to manage. To rotate: generate a new key pair, update both files, redeploy.
ecommerce.service.jwt.public-key-location=classpath:ecommerce-public.pem
ecommerce.service.jwt.issuer=${ECOMMERCE_SERVICE_JWT_ISSUER:buyology-ecommerce-service}

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Outbox publisher poll interval ───────────────────────────────────────────
outbox.poll-interval-ms=${OUTBOX_POLL_INTERVAL_MS:5000}

# ── Location data retention ───────────────────────────────────────────────────
location.retention-days=${LOCATION_RETENTION_DAYS:90}
location.cleanup-cron=${LOCATION_CLEANUP_CRON:0 0 2 * * *}

# ── Tracing ───────────────────────────────────────────────────────────────────
# Override per profile: 1.0 in dev (100%), 0.1 in prod (10%)
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:1.0}

# ── Logging — include traceId + spanId + requestId on every line ──────────────
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5level [${spring.application.name},%X{traceId:-},%X{spanId:-},%X{requestId:-}] %logger{36} - %msg%n

# ── Contabo object storage (S3-compatible) ────────────────────────────────────
contabo.s3.endpoint=${CONTABO_S3_ENDPOINT}
contabo.s3.access-key=${CONTABO_S3_ACCESS_KEY}
contabo.s3.secret-key=${CONTABO_S3_SECRET_KEY}
contabo.s3.bucket-name=${CONTABO_S3_BUCKET_NAME}
contabo.s3.public-url=${CONTABO_S3_PUBLIC_URL}

# ── Multipart upload limits ───────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

# ── Firebase Cloud Messaging — push notifications to courier mobile devices ───
# Set FIREBASE_ENABLED=true and supply the service account JSON (downloaded from
# Firebase Console → Project Settings → Service Accounts → Generate new private key).
# When false the FCM bean is absent and pushes are silently skipped.
firebase.enabled=${FIREBASE_ENABLED:false}
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# ── Twilio SendGrid — email notifications ────────────────────────────────────
# Email is a fallback channel for couriers not actively connected via WebSocket.
# Set NOTIFICATION_EMAIL_ENABLED=true and supply your SendGrid credentials to activate.
# Master switch — false by default so startup never fails without credentials
notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:false}
twilio.sendgrid.api-key=${SENDGRID_API_KEY:}
twilio.sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@buyology.com}
twilio.sendgrid.from-name=${SENDGRID_FROM_NAME:Buyology Courier}

# ── WebSocket / STOMP ─────────────────────────────────────────────────────────
# Courier mobile apps connect to ws://<host>/ws and subscribe to
# /user/queue/assignments to receive real-time new-order notifications.
# CORS for the WebSocket upgrade is handled by WebSocketConfig (setAllowedOriginPatterns).
# The JWT presented in the STOMP CONNECT frame is validated by WebSocketAuthChannelInterceptor.

# ── Graceful shutdown ─────────────────────────────────────────────────────────
# Allow in-flight HTTP requests to complete before the server stops
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
# Kubernetes liveness / readiness probes
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
