# ── Prod profile — production hardening ──────────────────────────────────────
# All settings here override application.properties when SPRING_PROFILES_ACTIVE=prod

# 10% trace sampling — reduces Zipkin/Tempo ingestion volume
management.tracing.sampling.probability=0.1

# Info-level logging in prod — no SQL or DEBUG noise
logging.level.root=INFO
logging.level.com.buyology=INFO

# Larger connection pool for production load
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10

# Outbox polling every 5s is fine for prod
outbox.poll-interval-ms=5000

# 90-day location retention in prod
location.retention-days=90

# Restrict Swagger UI in production — expose only the raw API docs for internal tooling
# To fully disable Swagger UI in prod, add: springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.enabled=false

# Stricter shutdown timeout in prod — allow more time for in-flight requests
spring.lifecycle.timeout-per-shutdown-phase=60s
