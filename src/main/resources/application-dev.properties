# ── Dev profile — local development defaults ──────────────────────────────────
# All settings here override application.properties when SPRING_PROFILES_ACTIVE=dev

# 100% trace sampling — capture every request locally
management.tracing.sampling.probability=1.0

# Debug SQL for development visibility
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.buyology=DEBUG

# Swagger UI accessible without auth in dev
# (SecurityConfig already permits /v3/api-docs/** and /swagger-ui/**)

# Outbox polling faster in dev for quick feedback
outbox.poll-interval-ms=2000

# Shorter location retention in dev to keep the DB small
location.retention-days=7
