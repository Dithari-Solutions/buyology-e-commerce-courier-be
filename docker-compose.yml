name: buyology-courier-be

services:

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: buyology-postgres
    environment:
      POSTGRES_DB: buyology_courier
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - courier-network
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: buyology-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - courier-network
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: buyology-redis
    command: >
      sh -c "[ -n '$$REDIS_PASSWORD' ] &&
             redis-server --requirepass $$REDIS_PASSWORD ||
             redis-server"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - courier-network
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  courier:
    image: ${IMAGE_TAG:-buyology-courier:local}
    container_name: buyology-courier
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/buyology_courier}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_POOL_SIZE: "30"
      DB_POOL_MIN_IDLE: "10"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_ISSUER_URI: ${JWT_ISSUER_URI}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_ADMIN_JWT_AUDIENCE: ${AUTH_ADMIN_JWT_AUDIENCE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      FIREBASE_ENABLED: ${FIREBASE_ENABLED:-false}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      CONTABO_S3_ENDPOINT: ${CONTABO_S3_ENDPOINT}
      CONTABO_S3_ACCESS_KEY: ${CONTABO_S3_ACCESS_KEY}
      CONTABO_S3_SECRET_KEY: ${CONTABO_S3_SECRET_KEY}
      CONTABO_S3_BUCKET_NAME: ${CONTABO_S3_BUCKET_NAME}
      CONTABO_S3_PUBLIC_URL: ${CONTABO_S3_PUBLIC_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - courier-network
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  courier-network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
