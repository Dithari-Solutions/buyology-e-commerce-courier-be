name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_PATH: /opt/buyology-courier-be

jobs:

  # ── Job 1: Build & Test ─────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: buyology_courier_test
          POSTGRES_USER: buyology
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U buyology"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build & run tests
        run: ./mvnw verify -Dspring.profiles.active=dev
        env:
          DB_URL: jdbc:postgresql://localhost:5432/buyology_courier_test
          DB_USERNAME: buyology
          DB_PASSWORD: postgres
          RABBITMQ_HOST: localhost
          RABBITMQ_USERNAME: guest
          RABBITMQ_PASSWORD: guest
          REDIS_HOST: localhost
          JWT_ISSUER_URI: http://localhost:8080/realms/buyology
          AUTH_JWT_SECRET: test-secret-at-least-32-chars-long!!

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  # ── Job 2: Build & Push Docker Image ───────────────────────────────────────
  publish:
    name: Publish Docker Image
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Production ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_ISSUER_URI: ${{ secrets.JWT_ISSUER_URI }}
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
          AUTH_ADMIN_JWT_AUDIENCE: ${{ secrets.AUTH_ADMIN_JWT_AUDIENCE }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          FIREBASE_ENABLED: ${{ secrets.FIREBASE_ENABLED }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          CONTABO_S3_ENDPOINT: ${{ secrets.CONTABO_S3_ENDPOINT }}
          CONTABO_S3_ACCESS_KEY: ${{ secrets.CONTABO_S3_ACCESS_KEY }}
          CONTABO_S3_SECRET_KEY: ${{ secrets.CONTABO_S3_SECRET_KEY }}
          CONTABO_S3_BUCKET_NAME: ${{ secrets.CONTABO_S3_BUCKET_NAME }}
          CONTABO_S3_PUBLIC_URL: ${{ secrets.CONTABO_S3_PUBLIC_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          envs: IMAGE_TAG,GHCR_TOKEN,GHCR_ACTOR,DB_URL,DB_USERNAME,DB_PASSWORD,RABBITMQ_USERNAME,RABBITMQ_PASSWORD,REDIS_PASSWORD,JWT_ISSUER_URI,AUTH_JWT_SECRET,AUTH_ADMIN_JWT_AUDIENCE,CORS_ALLOWED_ORIGINS,FIREBASE_ENABLED,FIREBASE_SERVICE_ACCOUNT_JSON,CONTABO_S3_ENDPOINT,CONTABO_S3_ACCESS_KEY,CONTABO_S3_SECRET_KEY,CONTABO_S3_BUCKET_NAME,CONTABO_S3_PUBLIC_URL
          script: |
            set -euo pipefail
            mkdir -p ${{ env.DEPLOY_PATH }}
            cd ${{ env.DEPLOY_PATH }}

            # ── Docker daemon log rotation (idempotent) ────────────────────────
            if [ ! -f /etc/docker/daemon.json ] || ! grep -q '"max-size"' /etc/docker/daemon.json 2>/dev/null; then
              mkdir -p /etc/docker
              printf '{\n  "log-driver": "json-file",\n  "log-opts": { "max-size": "50m", "max-file": "3" }\n}\n' > /etc/docker/daemon.json
              systemctl reload docker || true
            fi

            # ── Write .env from shell env vars ────────────────────────────────
            # FIREBASE_SERVICE_ACCOUNT_JSON excluded — may contain special
            # characters that break .env parsing. Docker Compose reads it
            # directly from the shell environment via envs above.
            cat > .env.tmp << ENVEOF
            IMAGE_TAG=${IMAGE_TAG}
            DB_URL=${DB_URL}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            JWT_ISSUER_URI=${JWT_ISSUER_URI}
            AUTH_JWT_SECRET=${AUTH_JWT_SECRET}
            AUTH_ADMIN_JWT_AUDIENCE=${AUTH_ADMIN_JWT_AUDIENCE}
            CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            FIREBASE_ENABLED=${FIREBASE_ENABLED}
            CONTABO_S3_ENDPOINT=${CONTABO_S3_ENDPOINT}
            CONTABO_S3_ACCESS_KEY=${CONTABO_S3_ACCESS_KEY}
            CONTABO_S3_SECRET_KEY=${CONTABO_S3_SECRET_KEY}
            CONTABO_S3_BUCKET_NAME=${CONTABO_S3_BUCKET_NAME}
            CONTABO_S3_PUBLIC_URL=${CONTABO_S3_PUBLIC_URL}
            ENVEOF
            mv .env.tmp .env
            chmod 600 .env

            # ── Login to GHCR ──────────────────────────────────────────────────
            printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_ACTOR}" --password-stdin

            # ── Pull new image ─────────────────────────────────────────────────
            docker compose pull courier

            # ── Tear down and bring up fresh ──────────────────────────────────
            docker compose down --remove-orphans || true
            docker compose up -d

            # Give Spring Boot + Flyway migrations time to complete
            sleep 40

            # ── Readiness probe (max 150s) ─────────────────────────────────────
            echo "Waiting for courier readiness (this can take up to 3 minutes)..."
            for i in $(seq 1 30); do
              # || echo "000" prevents set -e from killing the script on network errors (like status 56)
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" -m 10 http://localhost:8081/ || echo "000")
              
              # Any valid HTTP response (including 401 Unauthorized for protected routes) 
              # indicates that the Spring Boot application is up and listening.
              if [ "$HTTP" != "000" ]; then
                echo "  Deploy successful — courier is responding (HTTP $HTTP)."
                break
              fi
              
              if [ "$i" = "30" ]; then
                echo "ERROR: Courier did not become ready in 150s."
                docker compose logs --tail=100 courier
                exit 1
              fi
              
              echo "  attempt $i/30: service not ready yet... (HTTP $HTTP)"
              sleep 5
            done

            # ── Clean up dangling images ───────────────────────────────────────
            docker image prune -f --filter "until=24h" || true

            echo "=== Running containers ==="
            docker compose ps
